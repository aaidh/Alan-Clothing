<svg xmlns="http://www.w3.org/2000/svg" width="600" height="140" viewBox="0 0 600 140">
  <defs>
    <!-- Add a subtle drop shadow for depth -->
    <filter id="shadow" x="0" y="0" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0a0a0a" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- GitHub dark/light mode text colors -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&amp;display=swap');
    
    .title {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
      font-size: 72px;
      fill: #c8a96e; /* ALAN Gold */
      letter-spacing: 14px;
      font-weight: 500;
    }
    
    .subtitle {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      fill: #888888;
      letter-spacing: 4px;
      font-weight: 300;
      text-transform: uppercase;
    }

    @media (prefers-color-scheme: light) {
      .subtitle { fill: #555555; }
    }
  </style>

  <rect width="100%" height="100%" fill="transparent"/>
  
  <text x="50%" y="85" text-anchor="middle" class="title" filter="url(#shadow)">ALAN</text>
  <text x="50%" y="125" text-anchor="middle" class="subtitle">Premium Fashion House</text>
</svg>
